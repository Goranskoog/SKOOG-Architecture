name: Build QuakeRescue APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository contents
        run: |
          echo "Repository root:"
          pwd
          ls -la

      - name: Extract project ZIP
        run: |
          unzip -o "QuakeRescue LifeLink AutomaticPulse.zip" -d extracted

      - name: Show extracted files
        run: |
          echo "Extracted structure:"
          find extracted

      - name: Locate Android project
        run: |
          PROJECT_DIR=$(find extracted -name settings.gradle.kts | head -n 1 | xargs dirname)

          echo "PROJECT_DIR=$PROJECT_DIR"

          cp -r "$PROJECT_DIR"/* .

          echo "Current directory:"
          pwd
          ls -la

      - name: Verify Gradle files
        run: |
          test -f gradlew
          test -f settings.gradle.kts
          test -f build.gradle.kts
          ls -la

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Display Gradle version
        run: ./gradlew --version

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --info --no-daemon

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: QuakeRescue-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
