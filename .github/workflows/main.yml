name: Build QuakeRescue APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract project
        run: |
          unzip -o "QuakeRescue LifeLink AutomaticPulse.zip" -d .
          chmod +x gradlew

      - name: Verify project
        run: |
          echo "Current directory:"
          pwd
          ls -la
          test -f settings.gradle.kts
          test -f build.gradle.kts
          test -f gradlew
          test -d app
          test -d wear

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install required SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Show Gradle version
        run: ./gradlew --version

      - name: Build Debug APK
        run: ./gradlew clean assembleDebug --stacktrace --info --no-daemon

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: QuakeRescue-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
